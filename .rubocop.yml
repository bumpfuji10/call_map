AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.2
  CacheRootDirectory: tmp/rubocop_cache
  Exclude:
    - "pkg/**/*"
    - "tmp/**/*"
    - "vendor/**/*"
    - "spec/fixtures/**/*"

# RSpec の describe ブロックは長くなりがちなので spec では無効化する。
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/ClassLength:
  Exclude:
    - "lib/call_map/definition_collector.rb"
    - "lib/call_map/callback_extractor.rb"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes
