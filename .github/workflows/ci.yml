name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Ruby
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run tests and lint
        run: bundle exec rake

      - name: Build gem
        run: gem build call_map.gemspec
